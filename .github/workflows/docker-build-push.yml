name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - deployment/kubernetes-helm
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - deployment/kubernetes-helm

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: hoainnuit

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: ddoswep/backend/Dockerfile
            context: ddoswep/backend
            image: ddoswep-api
          - service: web
            dockerfile: ddoswep/Dockerfile
            context: ddoswep
            image: ddoswep-web
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=https://ddos-api.godemo.art

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          platforms: linux/amd64

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Build Success
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/ddoswep-api
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/ddoswep-web
        run: |
          echo "✅ Docker images built and pushed successfully"
          echo "🐳 API: $API_IMAGE"
          echo "🐳 Web: $WEB_IMAGE"
