services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ddos-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATA_DIR=/app/data
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-200}
      - MAX_CAT_CATEGORIES=${MAX_CAT_CATEGORIES:-2000}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ddos-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: ddos-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
    networks:
      - ddos-network

networks:
  ddos-network:
    driver: bridge
